# Logrotate configuration for DripEmails.org (project logs)
#
# IMPORTANT:
# - This config is pinned to /home/dripemails/web.
# - Example: /opt/dripemails/dripemails.org
#
# This file focuses on logs inside the project workspace.

/home/dripemails/web/logs/*.log
/home/dripemails/web/logs/*.jsonl
/home/dripemails/web/*.log
/home/dripemails/web/*.jsonl {
    su dripemails dripemails
    daily
    rotate 30
    compress
    delaycompress
    notifempty
    missingok
    copytruncate
    create 0640 dripemails dripemails
}

# Service logs outside the project directory
/var/log/gmail_processor.log
/var/log/gmail_processor_error.log
/var/log/imap_crawler.log
/var/log/imap_crawler_error.log
/var/log/dripemails.log
/var/log/dripemails-error.log
/var/log/supervisor/dripemails*.log
/var/log/supervisor/ollama-server*.log
/var/log/uwsgi/dripemails.log {
    su root root
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    missingok
    copytruncate
    create 0640 dripemails dripemails
}

/var/log/nginx/dripemails-*.log {
    su root root
    daily
    rotate 30
    compress
    delaycompress
    notifempty
    missingok
    copytruncate
    create 0640 dripemails www-data
}

